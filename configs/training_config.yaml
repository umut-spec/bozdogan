# Model Konfigürasyonu
model_name: "Qwen/Qwen2.5-14B-Instruct"
output_dir: "./models/bozdogan-14b"

# LoRA Parametreleri
lora:
  r: 32                    # A100'ü sömürüyoruz: daha yüksek rank = daha çok kapasite
  lora_alpha: 64          # Alpha = r*2
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# QLoRA için Quantization
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

# Training Parametreleri
training:
  num_train_epochs: 2               # 10k veride LoRA icin 2 epoch yeterli; 3 hafif overfit + uzun
  per_device_train_batch_size: 16   # veri kisa (avg ~420 tok), A100 40GB rahat kaldirir
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2    # Effective batch = 32
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Optimization
  optim: "paged_adamw_8bit"
  gradient_checkpointing: true      # FA2+packing ile bile guvenli taraf; OOM olursa zaten acik
  fp16: false
  bf16: true                        # A100 bfloat16 destekler

  # Logging & Saving
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  evaluation_strategy: "steps"
  eval_steps: 100

  # Dataset
  max_seq_length: 2048              # en uzun ornek ~1350 tok; kirpma yok
  packing: true                     # FA2 acik -> capraz bulasma yok, kisa ornekleri paketle (612 -> ~210 adim)
  attn_implementation: "flash_attention_2"   # FA2: hiz + bellek verimi + packing'i guvenli kilar

  # Distributed
  ddp_find_unused_parameters: false

# Veri Dosyaları
data:
  train_file: "data/splits/train.jsonl"
  val_file: "data/splits/val.jsonl"
  test_file: "data/splits/test.jsonl"

# Checkpoint / resume ayarları (Colab kopması ihtimaline karşı)
runtime:
  resume_from_checkpoint: true
  auto_find_batch_size: true
